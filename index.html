<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;margin:0;padding:0}
body{
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  color:white;
  overflow-x:hidden;
}
.page{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
  text-align:center;
}
.page.active{display:flex}
input,button{
  padding:12px 20px;
  border-radius:25px;
  border:none;
  font-size:15px;
  margin:10px;
}
input{font-weight:bold;text-align:center}
button{background:white;color:#ff4d6d;font-weight:bold}
button:disabled{opacity:.5;cursor:not-allowed}
#noBtn{position:static} 
#noText{min-height:30px;font-size:18px;margin-bottom:10px;font-weight:bold}
.button-row{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;align-items:center}
.card{
  perspective:1000px;
  width:100%;
  max-width:100%;
  height:70vh;
  margin:15px 0;
  position:relative;
}
.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .6s;
}
.card.clicked .inner{
  transform:rotateY(180deg);
}
.front, .back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.front img{
  width:100%;
  height:100%;
  object-fit:cover; /* full photo display */
}
.back{
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.5); /* semi-transparent overlay */
  padding:20px;
  border-radius:10px;
  transform:rotateY(180deg);
  text-align:center;
}
.back span{
  font-size:18px;
  color:#fff;
  line-height:1.4;
}
.fire{position:fixed;width:4px;height:4px;border-radius:50%;animation:blast 0.8s ease-out forwards;pointer-events:none}
@keyframes blast{from{transform:translate(0,0);opacity:1}to{transform:translate(var(--x),var(--y));opacity:0}}
.heart{position:fixed;bottom:-10px;animation:floatUp 3s linear forwards;pointer-events:none;font-size:14px}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-100vh);opacity:0}}
.punch{position:fixed;bottom:-10px;animation:punchUp 2s linear forwards;pointer-events:none;font-size:16px}
@keyframes punchUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-80vh);opacity:0}}
audio{display:none}
</style>
</head>

<script>
const PASSWORD="Hosiyari";
const pages=document.querySelectorAll(".page");
const music=document.getElementById("bgMusic");
const noText=document.getElementById("noText");
const pass=document.getElementById("pass");
const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const colors=["#ff4d6d","#ffd166","#cdb4db","#bde0fe","#fff","#ff85a2","#ffca3a"];
let heartsStarted=false;

function unlock(){
  if(pass.value!==PASSWORD){ alert("Wrong password 💔"); return; }
  music.currentTime=0;
  music.play();
  go(1);
}

function go(n){
  pages.forEach(p=>p.classList.remove("active"));
  document.getElementById("p"+n).classList.add("active");
  if(n>=2 && !heartsStarted){
    startHearts();
    heartsStarted=true;
  }
}

yesBtn.onclick=()=>go(2);

const messages=[
  "ooy",
  "Ghumne chlegi ?",
  "pgl open to kr ",
  "jaldi kr count 7 ho gya h🌸",
  "Khana bhi to khana h",
  "Jyada hosiyar mt bn 👊",
  "exam nh h , jo option milenge 😀",
  "utha kr fek dunga",
];

let msgIndex=0,typing=false;

noBtn.onclick=()=>{
  if(typing)return;
  typing=true;
  noText.innerHTML="";
  const text=messages[msgIndex++%messages.length];
  let i=0;
  const t=setInterval(()=>{
    const color=colors[Math.floor(Math.random()*colors.length)];
    noText.innerHTML+=`<span style="color:${color};font-weight:bold">${text[i]}</span>`;
    i++;
    if(i>=text.length){clearInterval(t);typing=false;}
  },45);
  startPunches();
};

function flip(card,page){
  fireworks();
  const span=card.querySelector(".back span");
  const text=card.querySelector(".back").dataset.text;
  if(!card.classList.contains("clicked")){
    span.textContent="";
    let i=0;
    const t=setInterval(()=>{
      const color=colors[Math.floor(Math.random()*colors.length)];
      span.innerHTML+=`<span style="color:${color}">${text[i]}</span>`;
      i++;
      if(i>=text.length)clearInterval(t);
    },35);
  }
  card.classList.toggle("clicked");
  const buttons=document.querySelectorAll(`#${page} button`);
  buttons.forEach(btn => btn.disabled = false);

}

function fireworks(){
  const colors=["#ff4d6d","#ffd166","#cdb4db","#bde0fe","#fff"];
  for(let i=0;i<50;i++){
    const f=document.createElement("div");
    f.className="fire";
    f.style.background=colors[Math.floor(Math.random()*colors.length)];
    f.style.left=innerWidth/2+"px";
    f.style.top=innerHeight/2+"px";
    f.style.setProperty("--x",(Math.random()*250-125)+"px");
    f.style.setProperty("--y",(Math.random()*250-125)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),800);
  }
}

function startHearts(){
  const emojis=["❤️","💖","💕","💘"];
  setInterval(()=>{
    for(let j=0;j<2;j++){
      const heart=document.createElement("div");
      heart.className="heart";
      heart.innerText=emojis[Math.floor(Math.random()*emojis.length)];
      heart.style.left=Math.random()*100+"vw";
      heart.style.fontSize=(14+Math.random()*20)+"px";
      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(),3000);
    }
  },100);
}

function startPunches(){
  const emojis=["🥊","👊"];
  for(let i=0;i<10;i++){
    setTimeout(()=>{
      const p=document.createElement("div");
      p.className="punch";
      p.innerText=emojis[Math.floor(Math.random()*emojis.length)];
      p.style.left=Math.random()*100+"vw";
      p.style.fontSize=(16+Math.random()*14)+"px";
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),2000);
    },i*100);
  }
}
